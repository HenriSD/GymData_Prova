<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>DER — GymData</title>
  <desc>Diagrama Entidade-Relacionamento do sistema GymData com 7 entidades</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- USUARIOS -->
  <g>
    <rect x="20" y="20" width="160" height="100" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <rect x="20" y="20" width="160" height="28" rx="8" fill="#534AB7"/>
    <rect x="20" y="40" width="160" height="8" fill="#534AB7"/>
    <text x="100" y="38" text-anchor="middle" font-size="13" font-weight="500" fill="white" font-family="sans-serif">USUARIOS</text>
    <text x="30" y="62"  font-size="11" fill="#3C3489" font-family="sans-serif">id PK</text>
    <text x="30" y="78"  font-size="11" fill="#3C3489" font-family="sans-serif">nome</text>
    <text x="30" y="94"  font-size="11" fill="#3C3489" font-family="sans-serif">email (unique)</text>
    <text x="30" y="110" font-size="11" fill="#3C3489" font-family="sans-serif">senha (bcrypt)</text>
  </g>

  <!-- ALUNOS -->
  <g>
    <rect x="250" y="20" width="180" height="130" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <rect x="250" y="20" width="180" height="28" rx="8" fill="#0F6E56"/>
    <rect x="250" y="40" width="180" height="8" fill="#0F6E56"/>
    <text x="340" y="38" text-anchor="middle" font-size="13" font-weight="500" fill="white" font-family="sans-serif">ALUNOS</text>
    <text x="260" y="62"  font-size="11" fill="#085041" font-family="sans-serif">id PK</text>
    <text x="260" y="78"  font-size="11" fill="#085041" font-family="sans-serif">nome</text>
    <text x="260" y="94"  font-size="11" fill="#085041" font-family="sans-serif">email (unique)</text>
    <text x="260" y="110" font-size="11" fill="#085041" font-family="sans-serif">cpf (unique)</text>
    <text x="260" y="126" font-size="11" fill="#085041" font-family="sans-serif">telefone, data_nasc.</text>
    <text x="260" y="142" font-size="11" fill="#085041" font-family="sans-serif">ativo</text>
  </g>

  <!-- PLANOS -->
  <g>
    <rect x="500" y="20" width="160" height="114" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <rect x="500" y="20" width="160" height="28" rx="8" fill="#854F0B"/>
    <rect x="500" y="40" width="160" height="8" fill="#854F0B"/>
    <text x="580" y="38" text-anchor="middle" font-size="13" font-weight="500" fill="white" font-family="sans-serif">PLANOS</text>
    <text x="510" y="62"  font-size="11" fill="#633806" font-family="sans-serif">id PK</text>
    <text x="510" y="78"  font-size="11" fill="#633806" font-family="sans-serif">nome</text>
    <text x="510" y="94"  font-size="11" fill="#633806" font-family="sans-serif">preco</text>
    <text x="510" y="110" font-size="11" fill="#633806" font-family="sans-serif">duracao_dias</text>
    <text x="510" y="126" font-size="11" fill="#633806" font-family="sans-serif">ativo</text>
  </g>

  <!-- MATRICULAS (pivo N:N aluno-plano) -->
  <g>
    <rect x="370" y="230" width="180" height="130" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <rect x="370" y="230" width="180" height="28" rx="8" fill="#993C1D"/>
    <rect x="370" y="250" width="180" height="8" fill="#993C1D"/>
    <text x="460" y="248" text-anchor="middle" font-size="13" font-weight="500" fill="white" font-family="sans-serif">MATRICULAS</text>
    <text x="380" y="272" font-size="10" fill="#711B0C" font-family="sans-serif" font-style="italic">pivô N:N aluno ↔ plano</text>
    <text x="380" y="290" font-size="11" fill="#711B0C" font-family="sans-serif">id PK</text>
    <text x="380" y="306" font-size="11" fill="#711B0C" font-family="sans-serif">aluno_id FK</text>
    <text x="380" y="322" font-size="11" fill="#711B0C" font-family="sans-serif">plano_id FK</text>
    <text x="380" y="338" font-size="11" fill="#711B0C" font-family="sans-serif">data_inicio, data_fim</text>
    <text x="380" y="354" font-size="11" fill="#711B0C" font-family="sans-serif">status</text>
  </g>

  <!-- TREINOS -->
  <g>
    <rect x="130" y="230" width="160" height="100" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <rect x="130" y="230" width="160" height="28" rx="8" fill="#0F6E56"/>
    <rect x="130" y="250" width="160" height="8" fill="#0F6E56"/>
    <text x="210" y="248" text-anchor="middle" font-size="13" font-weight="500" fill="white" font-family="sans-serif">TREINOS</text>
    <text x="140" y="272" font-size="11" fill="#085041" font-family="sans-serif">id PK</text>
    <text x="140" y="288" font-size="11" fill="#085041" font-family="sans-serif">aluno_id FK</text>
    <text x="140" y="304" font-size="11" fill="#085041" font-family="sans-serif">nome</text>
    <text x="140" y="320" font-size="11" fill="#085041" font-family="sans-serif">observacoes</text>
  </g>

  <!-- EXERCICIOS -->
  <g>
    <rect x="130" y="460" width="160" height="100" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <rect x="130" y="460" width="160" height="28" rx="8" fill="#185FA5"/>
    <rect x="130" y="480" width="160" height="8" fill="#185FA5"/>
    <text x="210" y="478" text-anchor="middle" font-size="13" font-weight="500" fill="white" font-family="sans-serif">EXERCICIOS</text>
    <text x="140" y="502" font-size="11" fill="#0C447C" font-family="sans-serif">id PK</text>
    <text x="140" y="518" font-size="11" fill="#0C447C" font-family="sans-serif">nome</text>
    <text x="140" y="534" font-size="11" fill="#0C447C" font-family="sans-serif">grupo_muscular</text>
    <text x="140" y="550" font-size="11" fill="#0C447C" font-family="sans-serif">descricao</text>
  </g>

  <!-- TREINO_EXERCICIOS (pivo N:N treino-exercicio) -->
  <g>
    <rect x="370" y="440" width="190" height="130" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
    <rect x="370" y="440" width="190" height="28" rx="8" fill="#993556"/>
    <rect x="370" y="460" width="190" height="8" fill="#993556"/>
    <text x="465" y="458" text-anchor="middle" font-size="12" font-weight="500" fill="white" font-family="sans-serif">TREINO_EXERCICIOS</text>
    <text x="380" y="480" font-size="10" fill="#72243E" font-family="sans-serif" font-style="italic">pivô N:N treino ↔ exercício</text>
    <text x="380" y="498" font-size="11" fill="#72243E" font-family="sans-serif">id PK</text>
    <text x="380" y="514" font-size="11" fill="#72243E" font-family="sans-serif">treino_id FK</text>
    <text x="380" y="530" font-size="11" fill="#72243E" font-family="sans-serif">exercicio_id FK</text>
    <text x="380" y="546" font-size="11" fill="#72243E" font-family="sans-serif">series, repeticoes</text>
    <text x="380" y="562" font-size="11" fill="#72243E" font-family="sans-serif">carga_kg</text>
  </g>

  <!-- RELACIONAMENTOS -->
  <!-- Alunos -> Matriculas (1:N) -->
  <line x1="340" y1="150" x2="430" y2="230" stroke="#73726c" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <text x="372" y="195" font-size="10" fill="#73726c" font-family="sans-serif">1:N</text>

  <!-- Planos -> Matriculas (1:N) -->
  <line x1="530" y1="134" x2="510" y2="230" stroke="#73726c" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <text x="526" y="190" font-size="10" fill="#73726c" font-family="sans-serif">1:N</text>

  <!-- Alunos -> Treinos (1:N) -->
  <line x1="290" y1="150" x2="240" y2="230" stroke="#73726c" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <text x="254" y="196" font-size="10" fill="#73726c" font-family="sans-serif">1:N</text>

  <!-- Treinos -> TreinoExercicios (1:N) -->
  <line x1="210" y1="330" x2="390" y2="440" stroke="#73726c" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <text x="268" y="398" font-size="10" fill="#73726c" font-family="sans-serif">1:N</text>

  <!-- Exercicios -> TreinoExercicios (1:N) -->
  <line x1="290" y1="510" x2="370" y2="510" stroke="#73726c" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <text x="310" y="504" font-size="10" fill="#73726c" font-family="sans-serif">1:N</text>

  <!-- Legenda -->
  <rect x="20" y="560" width="200" height="50" rx="6" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="30" y="578" font-size="11" fill="#5F5E5A" font-family="sans-serif" font-weight="500">Legenda</text>
  <rect x="30" y="586" width="10" height="10" rx="2" fill="#0F6E56"/>
  <text x="46" y="596" font-size="10" fill="#5F5E5A" font-family="sans-serif">Entidade principal</text>
  <rect x="120" y="586" width="10" height="10" rx="2" fill="#993C1D"/>
  <text x="136" y="596" font-size="10" fill="#5F5E5A" font-family="sans-serif">Tabela pivô (N:N)</text>
</svg>